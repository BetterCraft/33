<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>H3aler — Login</title>
<link id="favicon" rel="icon" type="image/x-icon" href="./assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0808;--s1:#160c0c;--s2:#1e1010;--border:#2e1414;
  --accent:#e53e3e;--err:#c0392b;--text:#efefef;--t2:#909090;--t3:#555;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Familjen Grotesk',sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(229,62,62,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(229,62,62,.04) 1px,transparent 1px);
  background-size:40px 40px;
  animation:gridmove 20s linear infinite;
  pointer-events:none;
}
@keyframes gridmove{to{background-position:40px 40px}}
body::after{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 60% 50% at 50% 50%, rgba(229,62,62,.07) 0%, transparent 70%);
  pointer-events:none;
}
.wrap{
  position:relative;z-index:1;
  width:380px;
  animation:pop .5s cubic-bezier(.34,1.4,.64,1);
}
@keyframes pop{from{opacity:0;transform:scale(.92) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
.card{
  background:var(--s1);border:1px solid var(--border);border-radius:16px;
  padding:32px;text-align:center;
  box-shadow:0 0 0 1px rgba(229,62,62,.05), 0 32px 64px rgba(0,0,0,.6);
}
.logo{
  font-size:42px;font-weight:700;letter-spacing:-.06em;line-height:1;margin-bottom:6px;
}
.logo em{color:var(--accent);font-style:normal}
.tagline{font-size:12px;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-bottom:28px}
.discord-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:13px;border-radius:10px;border:none;
  background:#5865f2;color:#fff;font-family:'Familjen Grotesk',sans-serif;
  font-size:15px;font-weight:700;cursor:pointer;
  transition:background .15s, transform .1s;
  text-decoration:none;
}
.discord-btn:hover{background:#4752c4;transform:translateY(-1px)}
.discord-btn:active{transform:translateY(0)}
.discord-icon{width:20px;height:20px;fill:#fff;flex-shrink:0}
.auth-note{font-size:11px;color:var(--t3);margin-top:14px;font-family:'JetBrains Mono',monospace;line-height:1.7}
.footer{text-align:center;margin-top:16px;font-size:11px;color:var(--t3);font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>
<script>
  const originalTitle = document.title;
  const originalFavicon = document.getElementById('favicon').href;
  const awayTitles = ["Hey! Come Back!", "Hey! Come Back!"];
  const awayFavicon = ["./assets/shock.png","./assets/worried.png"];
  let titleInterval;
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      let i = 0;
      titleInterval = setInterval(() => {
        document.title = awayTitles[i % awayTitles.length];
        if(document.getElementById('favicon')) document.getElementById('favicon').href = awayFavicon[i % awayFavicon.length];
        i++;
      }, 2000);
    } else {
      clearInterval(titleInterval);
      document.title = originalTitle;
      if(document.getElementById('favicon')) document.getElementById('favicon').href = originalFavicon;
    }
  });
</script>

<div class="wrap">
  <div class="card">
    <div class="logo">H<em>3</em>ALER.</div>
    <div class="tagline">// discord auth · v1.0</div>

    <a class="discord-btn" id="discord-link" href="#">
      <svg class="discord-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
      </svg>
      Login with Discord
    </a>
    <div class="auth-note">
      You'll be redirected to Discord's login page.<br/>
      After authorizing, H3aler opens automatically.
    </div>
  </div>
  <div class="footer">login.healer.eu.org · secure · no passwords stored</div>
</div>

<script>
const OAUTH_URL = 'https://discord.com/oauth2/authorize?client_id=1508861252364140554&response_type=code&redirect_uri=https%3A%2F%2Flogin.healer.eu.org%2Fdiscord%2Fauth%2Findex.html&scope=guilds.members.read+identify+guilds';

const params = new URLSearchParams(window.location.search);
if (params.has('req')) sessionStorage.setItem('authReq', params.get('req'));

document.getElementById('discord-link').href = OAUTH_URL;
</script>
</body>
</html>
